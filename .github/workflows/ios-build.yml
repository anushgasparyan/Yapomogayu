name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project Yapomogayu.xcodeproj

      - name: Build (no signing)
        run: |
          xcodebuild clean build \
          -project Yapomogayu.xcodeproj \
          -scheme Yapomogayu \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO
name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.3.app || true

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
          -scheme Yapomogayu \
          -sdk iphoneos \
          -configuration Release \
          build


